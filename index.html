<style>
@import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@400;500;600;700;800&display=swap');
:root{--bg:#07111E;--panel:#0E1F35;--panel2:#152940;--gold:#C9A84C;--gold2:#E8C96A;--text:#D8E8F8;--muted:#6A8AAA;--dim:#3A5A7A;--border:#1A3550;--danger:#D94F4F;--success:#4CAF7A;--warn:#E8A030;--info:#3A8FD9;--purple:#8B5CF6;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;}
::-webkit-scrollbar{width:6px;height:6px;}::-webkit-scrollbar-track{background:var(--panel);}::-webkit-scrollbar-thumb{background:var(--dim);border-radius:3px;}

/* LOGIN */
.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-box{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:400px;text-align:center;}
.login-logo{font-family:'Crimson Pro',serif;font-size:36px;font-weight:700;color:var(--gold);letter-spacing:3px;margin-bottom:6px;}
.login-sub{color:var(--muted);font-size:12px;letter-spacing:1px;text-transform:uppercase;margin-bottom:32px;}
.login-field{margin-bottom:16px;text-align:left;}
.login-field label{display:block;color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;}
.login-field input{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;}
.login-field input:focus{border-color:var(--gold);}
.login-btn{width:100%;padding:13px;background:var(--gold);color:#07111E;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;}
.login-btn:hover{background:var(--gold2);}
.login-err{color:var(--danger);font-size:13px;margin-top:10px;}
.login-loading{color:var(--muted);font-size:13px;margin-top:10px;}

/* APP */
#app{display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:var(--panel);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.logo{padding:12px 0;}.logo-title{color:var(--gold);font-family:'Crimson Pro',serif;font-weight:700;font-size:22px;letter-spacing:3px;}
.logo-sub{color:var(--muted);font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.topbar-stats{display:flex;gap:8px;}
.top-stat{background:var(--bg);border-radius:8px;padding:7px 12px;text-align:center;min-width:60px;}
.top-stat-val{color:var(--gold);font-weight:800;font-size:16px;line-height:1;}

// ═══ AUTH ═════════════════════════════════════════════════════════
window.doLogin=async function(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const msg=document.getElementById('login-msg');
  if(!email||!pass){msg.innerHTML='<div class="login-err">Complete todos los campos</div>';return;}
  if(!sb){msg.innerHTML='<div class="login-loading">Conectando... espere un momento e intente de nuevo.</div>';return;}

  const{error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){msg.innerHTML=`<div class="login-err">Credenciales incorrectas. Verifique su correo y contraseña.</div>`;}
};

window.doRegister=async function(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const msg=document.getElementById('login-msg');
  if(!email||!pass){msg.innerHTML='<div class="login-err">Complete correo y contraseña</div>';return;}
  if(pass.length<6){msg.innerHTML='<div class="login-err">La contraseña debe tener al menos 6 caracteres</div>';return;}
  if(!sb){msg.innerHTML='<div class="login-loading">Conectando... espere un momento.</div>';return;}
  msg.innerHTML='<div class="login-loading">Creando cuenta...</div>';
  const{error}=await sb.auth.signUp({email,password:pass});

  else{msg.innerHTML='<div class="login-loading">✓ Cuenta creada. Ahora ingrese con su correo y contraseña.</div>';}
};

window.doLogout=async function(){

};

// ═══ CARGA DE DATOS ════════════════════════════════════════════════
async function loadAllData(){
  setSyncStatus('syncing');
  try{
    const timeout=new Promise((_,reject)=>setTimeout(()=>reject(new Error('timeout')),10000));
    const fetchAll=Promise.all([
      sb.from('clientes').select('*').order('created_at'),
      sb.from('demandados').select('*').order('created_at'),
      sb.from('prospectos').select('*').order('created_at'),
      sb.from('procesos').select('*').order('created_at'),
      sb.from('actuaciones').select('*').order('fecha'),
      sb.from('audiencias').select('*').order('fecha'),
      sb.from('tareas').select('*').order('created_at'),
      sb.from('movimientos').select('*').order('fecha',{ascending:false}),
      sb.from('personal').select('*').order('fecha',{ascending:false}),
      sb.from('configuracion').select('*'),
    ]);
    const[cl,dm,ps,pr,ac,aud,ta,mo,pe,cfg]=await Promise.race([fetchAll,timeout]);
    DB.clientes=cl.data||[];
    DB.demandados=dm.data||[];
    DB.prospectos=ps.data||[];
    DB.procesos=pr.data||[];
    DB.actuaciones=ac.data||[];
    DB.audiencias=aud.data||[];
    DB.tareas=ta.data||[];
    DB.movimientos=mo.data||[];
    DB.personal=pe.data||[];
    (cfg.data||[]).forEach(c=>{
      try{DB.cfg[c.clave]=JSON.parse(typeof c.valor==='string'?c.valor:JSON.stringify(c.valor));}catch{}
    });
    setSyncStatus('ok');
  }catch(e){
    console.warn('Error cargando:',e.message);
    setSyncStatus('error');
  }
}

// ═══ HELPERS DB ════════════════════════════════════════════════════
async function dbInsert(tabla,data){
  setSyncStatus('syncing');
  const{error}=await sb.from(tabla).insert(data);
  setSyncStatus(error?'error':'ok');
  if(error)toast('Error al guardar: '+error.message,'err');
  return!error;
}
async function dbUpdate(tabla,id,data){
  setSyncStatus('syncing');
  const{error}=await sb.from(tabla).update(data).eq('id',id);
  setSyncStatus(error?'error':'ok');
  if(error)toast('Error al actualizar: '+error.message,'err');
  return!error;
}
async function dbDelete(tabla,id){
  setSyncStatus('syncing');
  const{error}=await sb.from(tabla).delete().eq('id',id);
  setSyncStatus(error?'error':'ok');
  if(error)toast('Error al eliminar: '+error.message,'err');
  return!error;
}
async function dbUpsertCfg(clave,valor){
  setSyncStatus('syncing');
  const{error}=await sb.from('configuracion').upsert({clave,valor:JSON.stringify(valor),updated_at:new Date().toISOString()},{onConflict:'clave'});
  setSyncStatus(error?'error':'ok');
  if(error)toast('Error al guardar configuración','err');
  return!error;
}

  const opts=tipo==='dm'?DB.demandados.map(d=>({id:d.id,nombre:d.nombre})):DB.clientes.map(c=>({id:c.id,nombre:c.nombre}));
  return`<div id="tgs-${key}" style="display:flex;flex-wrap:wrap;gap:4px;min-height:26px;margin-bottom:6px">${tags.map(t=>`<span class="tag">${esc(t.nombre)}<button class="tag-del" onclick="removeTag('${key}','${t.id}')">×</button></span>`).join('')}</div>
  <div class="flex g8"><select id="ts-${key}" style="flex:1"><option value="">— Seleccionar —</option>${opts.map(o=>`<option value="${o.id}">${esc(o.nombre)}</option>`).join('')}</select><button type="button" class="btn btn-s sm" onclick="addTag('${key}','${tipo}')">+ Añadir</button></div>`;
}
window.addTag=function(key,tipo){const s=document.getElementById('ts-'+key);if(!s||!s.value)return;const tags=window._tags[key]||[];if(tags.find(t=>t.id===s.value))return;const opts=tipo==='dm'?DB.demandados:DB.clientes;const f=opts.find(o=>o.id===s.value);if(f){window._tags[key]=[...tags,{id:f.id,nombre:f.nombre}];document.getElementById('tgs-'+key).outerHTML=tagsHTML(key,tipo);s.value='';}};
window.removeTag=function(key,id){window._tags[key]=(window._tags[key]||[]).filter(t=>t.id!==id);const c=document.getElementById('tgs-'+key);if(c)c.outerHTML=tagsHTML(key,key.includes('dm')?'dm':'cl');};

function pgDash(){
  const hoy=today();
  const ing=DB.movimientos.filter(m=>m.tipo==='Ingreso'&&m.estado==='Pagado').reduce((s,m)=>s+Number(m.monto),0);
  const egr=DB.movimientos.filter(m=>m.tipo==='Egreso'&&m.estado==='Pagado').reduce((s,m)=>s+Number(m.monto),0);
  const venc=DB.tareas.filter(t=>t.fecha_limite&&t.fecha_limite<hoy&&t.estado!=='Completada').length;
  const prox=DB.tareas.filter(t=>t.estado!=='Completada'&&t.fecha_limite).sort((a,b)=>a.fecha_limite.localeCompare(b.fecha_limite)).slice(0,5);
  const actRec=[...DB.actuaciones].sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||'')).slice(0,5);
  const clMap=Object.fromEntries(DB.clientes.map(c=>[c.id,c.nombre]));
  const prMap=Object.fromEntries(DB.procesos.map(p=>[p.id,p]));
  const pc={Alta:'var(--danger)',Media:'var(--warn)',Baja:'var(--success)'};
  const SC=(icon,val,lbl,color,tab)=>`<div class="card" style="text-align:center;cursor:pointer" onclick="goTab('${tab}')" onmouseenter="this.style.borderColor='var(--gold)'" onmouseleave="this.style.borderColor='var(--border)'"><div style="font-size:22px;margin-bottom:4px">${icon}</div><div style="color:${color};font-weight:800;font-size:20px;margin-bottom:3px">${esc(String(val))}</div><div class="tm fs11 fw7 upper">${lbl}</div></div>`;
  document.getElementById('pb').innerHTML=`
  <div class="grid gauto g12 mb18">
    ${SC('👥',DB.clientes.length,'Clientes','var(--info)','clientes')}
    ${SC('⚖️',DB.procesos.filter(p=>p.estado==='Activo').length,'Activos','var(--gold)','procesos')}
    ${SC('🔍',DB.prospectos.filter(p=>!['Descartado','Listo para contratar'].includes(p.estado)).length,'Prospectos','var(--purple)','prospectos')}
    ${SC('📋',DB.actuaciones.length,'Actuaciones','var(--muted)','procesos')}
    ${SC('⚠️',venc,'Vencidas',venc>0?'var(--danger)':'var(--muted)','tareas')}
    ${SC('💰',fmtCOP(ing-egr),'Saldo',(ing-egr)>=0?'var(--success)':'var(--danger)','contabilidad')}
  </div>
  <div class="grid g2 g16">
    <div class="card"><div class="sl mb10">📅 Próximas Tareas</div>
      ${prox.length===0?'<div class="tm fs13">Sin tareas</div>':prox.map(t=>{const v=t.fecha_limite<hoy;return`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:var(--bg);border-radius:7px;border-left:3px solid ${pc[t.prioridad]||'var(--muted)'};margin-bottom:5px"><div><div style="color:${v?'var(--danger)':'var(--text)'};font-weight:600;font-size:13px">${esc(t.titulo)}</div><div class="tm fs11">${esc(clMap[t.cliente_id]||'General')}</div></div><div style="color:${v?'var(--danger)':'var(--warn)'};font-size:11px;font-weight:700">${v?'⚠ ':''}${fmtDate(t.fecha_limite)}</div></div>`;}).join('')}
    </div>
    <div class="card"><div class="sl mb10">📋 Actuaciones Recientes</div>
      ${actRec.length===0?'<div class="tm fs13">Sin actuaciones</div>':actRec.map(a=>{const p=prMap[a.proceso_id];return`<div style="padding:7px 10px;background:var(--bg);border-radius:7px;margin-bottom:5px"><div class="flex jb"><span style="font-weight:600;font-size:13px">${esc(a.tipo)}</span><span class="tg fs12 fw7">${fmtDate(a.fecha)}</span></div>${p?`<div class="tm fs12">${esc(clMap[p.cliente_id]||'')} — ${esc(p.despacho||'')}</div>`:''}</div>`;}).join('')}
    </div>
  </div>`;
}

function pgClientes(q=''){
  const list=q?DB.clientes.filter(c=>`${c.nombre} ${c.cedula} ${c.ciudad}`.toLowerCase().includes(q.toLowerCase())):DB.clientes;
  const getSaldo=cid=>{const movs=DB.movimientos.filter(m=>m.cliente_id===cid);const ing=movs.filter(m=>m.tipo==='Ingreso'&&m.estado==='Pagado').reduce((s,m)=>s+Number(m.monto),0);const egr=movs.filter(m=>m.tipo==='Egreso'&&m.estado==='Pagado').reduce((s,m)=>s+Number(m.monto),0);return ing-egr;};
  const rows=list.map(c=>{const saldo=getSaldo(c.id);const nPr=DB.procesos.filter(p=>p.cliente_id===c.id).length;

      <div class="stat-m"><div class="stat-mv tg">${nPr}</div><div class="stat-ml">Proc.</div></div>

function pgProspectos(fEst=''){
  const rfMap=Object.fromEntries((DB.cfg.referidos||[]).map(r=>[(r.id||r.nombre),r.nombre]));
  const list=fEst?DB.prospectos.filter(p=>p.estado===fEst):DB.prospectos;
  const estColor={'En espera de llamada':'var(--warn)','En espera de documentos':'var(--warn)','En espera de gestión':'var(--warn)','En negociación':'var(--info)','Listo para contratar':'var(--success)','Descartado':'var(--danger)'};
  const bdgPS=e=>{const m={'En espera de llamada':'by','En espera de documentos':'by','En espera de gestión':'by','En negociación':'bb','Listo para contratar':'bg','Descartado':'br'};return bdg(e,m[e]||'bgr');};
  const rows=list.map(ps=>{
    const docsTrae=Array.isArray(ps.docs_trae)?ps.docs_trae:[];
    const docsPend=Array.isArray(ps.documentos_pendientes)?ps.documentos_pendientes:[];
    const dPend=docsPend.filter(d=>!d.ok).length;
    const dTrae=docsTrae.filter(d=>d.ok).length;
    return`<div class="card mb10" style="border-left:3px solid ${estColor[ps.estado]||'var(--muted)'}">
      <div class="flex jb ais wrap g12">
        <div class="f1">
          <div class="flex aic g8 wrap mb4"><span class="fw7 fs15">${esc(ps.nombres||'Sin nombre')}</span>${bdgPS(ps.estado)}${bdg(ps.tipo_accion||'—','bb')}</div>
          ${ps.cedula?`<div class="tm fs13">${esc(ps.tipo_id||'CC')}: ${esc(ps.cedula)}${ps.edad?' · '+ps.edad+' años':''}</div>`:''}
          ${ps.telefono?`<div class="tm fs13">📞 ${esc(ps.telefono)}${ps.email?' · ✉ '+esc(ps.email):''}</div>`:''}
          ${ps.empresa_demandada?`<div class="tm fs13">⚔️ ${esc(ps.empresa_demandada)}</div>`:''}
          ${ps.referido_id?`<div class="tm fs13">👥 Ref: ${esc(rfMap[ps.referido_id]||'—')}</div>`:''}
          <div class="flex g12 mt6 wrap">
            ${docsTrae.length>0?`<span class="ts fs12">📄 Docs: ${dTrae}/${docsTrae.length}</span>`:''}
            ${dPend>0?`<span class="tw fs12">⏳ Pendientes: ${dPend}</span>`:''}
          </div>
        </div>

function pgProcesos(q='',fE='',fC=''){
  if(curProcId){pgProcesoDetalle(curProcId);return;}
  const clMap=Object.fromEntries(DB.clientes.map(c=>[c.id,c.nombre]));
  const list=DB.procesos.filter(p=>`${p.radicado} ${p.despacho} ${p.tipo} ${clMap[p.cliente_id]||''}`.toLowerCase().includes(q.toLowerCase())&&(!fE||p.estado===fE)&&(!fC||p.cliente_id===fC))
    .map(p=>({...p,nAc:DB.actuaciones.filter(a=>a.proceso_id===p.id).length,saldo:DB.movimientos.filter(m=>m.proceso_id===p.id).reduce((s,m)=>m.tipo==='Ingreso'&&m.estado==='Pagado'?s+Number(m.monto):m.tipo==='Egreso'&&m.estado==='Pagado'?s-Number(m.monto):s,0)}));
  const rows=list.map(p=>{
    const dtes=(Array.isArray(p.demandantes)?p.demandantes:[]).map(d=>esc(clMap[d.id]||d.nombre||'')).filter(Boolean);
    const dems=(Array.isArray(p.demandados)?p.demandados:[]).map(d=>esc(d.nombre||'')).filter(Boolean);
    if(!dtes.length&&p.cliente_id)dtes.push(esc(clMap[p.cliente_id]||'—'));
    return`<div class="card hover mb10" onclick="abrirProceso('${p.id}')">
      <div class="flex jb aic wrap g12">
        <div class="f1">
          <div class="flex aic g8 wrap mb4"><span class="fw7 fs15">${esc(p.despacho||'⚠ Juzgado pendiente')}</span>${bdgEPR(p.estado)}${bdgTipo(p.tipo)}</div>
          <div class="tg fs13 fw7 mb2">👤 ${dtes.join(' · ')||'—'}</div>
          ${dems.length?`<div class="tm fs13 mb2">⚔️ ${dems.join(' · ')}</div>`:''}
          <div class="tm fs13">${p.radicado?'Rad: '+esc(p.radicado)+' · ':''}${esc(p.etapa)}${p.ciudad?' · '+esc(p.ciudad):''}</div>
          ${p.observacion?`<div class="tm fs12 ital mt4" style="max-width:500px">📝 ${esc(p.observacion.slice(0,100))}${p.observacion.length>100?'…':''}</div>`:''}
          ${p.estado_actual?`<div style="color:var(--warn);font-size:12px;margin-top:4px;max-width:500px">⚡ <strong>Estado:</strong> ${esc(p.estado_actual.slice(0,120))}${p.estado_actual.length>120?'…':''}</div>`:''}
        </div>
        <div class="flex aic g14"><div class="stat-m"><div class="stat-mv tg">${p.nAc}</div><div class="stat-ml">Act.</div></div><div class="stat-m"><div class="stat-mv" style="color:${p.saldo>=0?'var(--success)':'var(--danger)'};font-size:12px">${fmtCOP(p.saldo)}</div><div class="stat-ml">Saldo</div></div><span class="tg" style="font-size:18px">›</span></div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('pb').innerHTML=`<div class="toolbar"><input id="pr-q" placeholder="🔍 Buscar..." value="${esc(q)}" oninput="filterPR()">
    <select id="pr-e" onchange="filterPR()" style="flex:none;min-width:130px"><option value="">Todos</option>${sOpts(ESTADOS_PR,fE)}</select>
    <select id="pr-c" onchange="filterPR()" style="flex:none;min-width:150px"><option value="">Todos los clientes</option>${DB.clientes.map(c=>`<option value="${c.id}"${c.id===fC?' selected':''}>${esc(c.nombre)}</option>`).join('')}</select>
    <button class="btn btn-p" onclick="openPrModal()">+ Nuevo Proceso</button><button class="btn btn-info sm" onclick="expPDFLista()">📄 Exportar PDF</button></div>
    <div class="tm fs12 mb12">${list.length} proceso(s) · <span class="tg">Clic para ver detalle</span></div>
    ${list.length===0?'<div class="empty"><div class="empty-icon">⚖️</div>Sin procesos</div>':rows}`;
}

function pgProcesoDetalle(id){
  const pr=DB.procesos.find(p=>p.id===id);if(!pr){curProcId=null;pgProcesos();return;}
  const clMap=Object.fromEntries(DB.clientes.map(c=>[c.id,c.nombre]));
  const dmMap=Object.fromEntries(DB.demandados.map(d=>[d.id,d.nombre]));

  const ac=DB.actuaciones.filter(a=>a.proceso_id===id);
  const mo=DB.movimientos.filter(m=>m.proceso_id===id);
  const ing=mo.filter(m=>m.tipo==='Ingreso'&&m.estado==='Pagado').reduce((s,m)=>s+Number(m.monto),0);

  const chk=Array.isArray(pr.check_estados)?pr.check_estados:[];
  const lastChk=chk.length?[...chk].sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||''))[0]:null;
  const rf=pr.referido_id?rfMap[pr.referido_id]:null;
  const aud=DB.audiencias.filter(a=>a.proceso_id===id);
  const taPr=DB.tareas.filter(t=>t.proceso_id===id);
  const itabs=[{id:'actuaciones',lbl:`📋 Actuaciones (${ac.length})`},{id:'audiencias',lbl:`🗓️ Audiencias (${aud.length})`},{id:'tareas',lbl:`✅ Tareas (${taPr.length})`},{id:'contabilidad',lbl:`💰 Contabilidad (${mo.length})`},{id:'estados',lbl:`🔍 Estados (${chk.length})`},{id:'info',lbl:'⚙ Info'}];
  let inner='';
  if(prIT==='actuaciones')inner=tlHTML(ac,id);
  else if(prIT==='audiencias')inner=audPrHTML(aud,id);
  else if(prIT==='tareas')inner=taPrHTML(taPr,id);
  else if(prIT==='contabilidad')inner=contPrHTML(mo,id,pr.cliente_id||'');
  else if(prIT==='estados')inner=estJudHTML(chk,id);
  else inner=infoPrHTML(pr,clMap,dmMap,rf);
  document.getElementById('pb').innerHTML=`
    <button class="btn btn-s sm mb12" onclick="volverPR()">← Volver</button>
    <div class="card gold-left mb16">
      <div class="flex jb ais wrap g14">
        <div class="f1">
          <div class="flex aic g8 wrap mb6"><h2 style="font-size:16px;font-weight:800">${esc(pr.despacho||'⚠ Juzgado pendiente')}</h2>${bdgEPR(pr.estado)}${bdgTipo(pr.tipo)}</div>
          <div class="tg fs14 fw7 mb4">👤 ${dtes.join(' · ')||'—'}</div>
          ${dems.length?`<div class="tm fs13 mb4">⚔️ ${dems.join(' · ')}</div>`:''}
          <div class="tm fs13">${pr.radicado?'Rad: '+esc(pr.radicado)+' · ':''}${esc(pr.etapa)}${pr.ciudad?' · '+esc(pr.ciudad):''}</div>
          ${pr.observacion?`<div class="tm fs13 ital mt4">📝 ${esc(pr.observacion.slice(0,150))}${pr.observacion.length>150?'…':''}</div>`:''}
          ${rf?`<div class="tm fs13 mt4">👥 Ref: ${esc(rf.nombre)}${pr.referido_comision_valor?' · Comisión: '+esc(String(pr.referido_comision_valor))+(pr.referido_comision_tipo==='Porcentaje'?'%':' COP'):''}</div>`:''}
          ${lastChk?`<div class="ts fs12 mt4">🔍 Último estado: ${fmtDate(lastChk.fecha)} — ${esc(lastChk.actuacion||'Sin novedad')}</div>`:`<div class="tw fs12 mt4">⚠ Estado judicial sin revisar</div>`}
        </div>
        <div class="flex g14 aic">
          <div class="stat-m"><div class="stat-mv tg" style="font-size:20px">${ac.length}</div><div class="stat-ml">Actuac.</div></div>
          <div class="stat-m"><div class="stat-mv" style="color:${(ing-egr)>=0?'var(--success)':'var(--danger)'};font-size:16px">${fmtCOP(ing-egr)}</div><div class="stat-ml">Saldo</div></div>
        </div>
      </div>
    </div>
    <div class="inner-tabs">${itabs.map(t=>`<button class="it${t.id===prIT?' active':''}" onclick="switchPrTab('${t.id}','${id}')">${t.lbl}</button>`).join('')}</div>

  const sorted=[...ac].sort((a,b)=>(a.fecha||'').localeCompare(b.fecha||''));

}

function contPrHTML(mo,pid,cid){
  const sorted=[...mo].sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||''));
  const ing=mo.filter(m=>m.tipo==='Ingreso'&&m.estado==='Pagado').reduce((s,m)=>s+Number(m.monto),0);

window.expICSProceso=function(pid){
  const pr=DB.procesos.find(p=>p.id===pid);
  const clMap=Object.fromEntries(DB.clientes.map(c=>[c.id,c.nombre]));
  const hoy=today();
  const evs=[];
  // Próximas audiencias
  DB.audiencias.filter(a=>a.proceso_id===pid&&a.proxima_fecha&&a.proxima_fecha>=hoy).forEach(a=>{
    evs.push({uid:a.id+'_prx@lx4',fecha:a.proxima_fecha,titulo:'🗓️ '+esc(a.proxima_actuacion||a.tipo)+' — '+(pr?.despacho||''),desc:'Proceso: '+(pr?.despacho||'')+'\\nCliente: '+(clMap[pr?.cliente_id]||'')+'\\nRadicado: '+(pr?.radicado||''),alarm:1440});
  });
  // Audiencias futuras directas
  DB.audiencias.filter(a=>a.proceso_id===pid&&a.fecha>=hoy&&!a.proxima_fecha).forEach(a=>{
    evs.push({uid:a.id+'@lx4',fecha:a.fecha,titulo:'🗓️ '+esc(a.tipo)+' — '+(pr?.despacho||''),desc:'Proceso: '+(pr?.despacho||'')+'\\nCliente: '+(clMap[pr?.cliente_id]||''),alarm:1440});
  });
  if(!evs.length){toast('Sin audiencias futuras en este proceso','err');return;}
  _generarICS(evs,'LEXIS_audiencias_proceso_'+today()+'.ics');
  toast(evs.length+' audiencia(s) exportadas a Outlook');
};
window.expICSAud=function(audId){
  const a=DB.audiencias.find(x=>x.id===audId);if(!a)return;
  const pr=DB.procesos.find(p=>p.id===a.proceso_id);
  const clMap=Object.fromEntries(DB.clientes.map(c=>[c.id,c.nombre]));
  const fecha=a.proxima_fecha||a.fecha;
  const evs=[{uid:a.id+'@lx4',fecha,titulo:'🗓️ '+(a.proxima_actuacion||a.tipo)+' — '+(pr?.despacho||''),desc:'Proceso: '+(pr?.despacho||'')+'\\nCliente: '+(clMap[pr?.cliente_id]||''),alarm:1440}];
  _generarICS(evs,'LEXIS_audiencia_'+today()+'.ics');
  toast('Audiencia exportada a Outlook');
};
function _generarICS(evs,fname){
  const fd=d=>{const[y,m,da]=d.split('-');return y+m+da;};
  const st=new Date().toISOString().replace(/[-:.]/g,'').slice(0,15)+'Z';
  const sf=s=>String(s||'').replace(/\\/g,'\\\\').replace(/\n/g,'\\n').replace(/,/g,'\\,').replace(/;/g,'\\;');
  let ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//LEXIS v4//ES\r\nCALSCALE:GREGORIAN\r\nMETHOD:PUBLISH\r\nX-WR-CALNAME:LEXIS Audiencias\r\nX-WR-TIMEZONE:America/Bogota\r\n';
  evs.forEach(ev=>{ics+='BEGIN:VEVENT\r\nUID:'+ev.uid+'\r\nDTSTAMP:'+st+'\r\nDTSTART;VALUE=DATE:'+fd(ev.fecha)+'\r\nDTEND;VALUE=DATE:'+fd(ev.fecha)+'\r\nSUMMARY:'+sf(ev.titulo)+'\r\nDESCRIPTION:'+sf(ev.desc)+'\r\nBEGIN:VALARM\r\nTRIGGER:-PT'+ev.alarm+'M\r\nACTION:DISPLAY\r\nDESCRIPTION:Recordatorio LEXIS\r\nEND:VALARM\r\nEND:VEVENT\r\n';});
  ics+='END:VCALENDAR';
  dlFile(ics,fname,'text/calendar;charset=utf-8');
}

function pgTareas(fE='',fC='',fMes=''){

  document.getElementById('pb').innerHTML=`<div class="toolbar">
    <input type="month" id="ta-mes" value="${esc(fMes)}" onchange="filterTA()" title="Filtrar por mes" style="flex:none;min-width:150px">
    <select id="ta-e" onchange="filterTA()" style="flex:1;min-width:130px"><option value="">Todos</option>${sOpts(['Pendiente','En proceso','Completada'],fE)}</select>
    <select id="ta-c" onchange="filterTA()" style="flex:1;min-width:150px"><option value="">Todos los clientes</option>${DB.clientes.map(c=>`<option value="${c.id}"${c.id===fC?' selected':''}>${esc(c.nombre)}</option>`).join('')}</select>
    <button class="btn btn-p" onclick="openTaModal()">+ Nueva Tarea</button>
    <button class="btn btn-s sm" onclick="document.getElementById('ta-mes').value='';filterTA()">✕</button>
  </div>
  <div class="tm fs12 mb12">${list.length} tarea(s)</div>
  ${list.length===0?'<div class="empty"><div class="empty-icon">✅</div>Sin tareas</div>':rows}`;
}

window.ejecutarConsulta=function(){
  const mes=document.getElementById('q-mes')?.value||'';
  const est=document.getElementById('q-est')?.value||'';
  const etapa=document.getElementById('q-etapa')?.value||'';
  const tipo=document.getElementById('q-tipo')?.value||'';
  const juz=document.getElementById('q-juz')?.value||'';
  const ciu=document.getElementById('q-ciu')?.value||'';
  const emp=document.getElementById('q-emp')?.value||'';
  const ref=document.getElementById('q-ref')?.value||'';
  const rad=document.getElementById('q-rad')?.value.trim().toLowerCase()||'';
  const clMap=Object.fromEntries(DB.clientes.map(c=>[c.id,c.nombre]));
  const dmMap=Object.fromEntries(DB.demandados.map(d=>[d.id,d.nombre]));
  const rfMap=Object.fromEntries((DB.cfg.referidos||[]).map(r=>[(r.id||r.nombre),r.nombre]));
  let list=DB.procesos.filter(p=>{
    if(mes&&!(p.fecha_inicio||'').startsWith(mes))return false;
    if(est&&p.estado!==est)return false;
    if(etapa&&p.etapa!==etapa)return false;
    if(tipo&&p.tipo!==tipo)return false;
    if(juz&&!(p.despacho||'').includes(juz))return false;
    if(ciu&&p.ciudad!==ciu)return false;
    if(emp){const dems=(Array.isArray(p.demandados)?p.demandados:[]).map(d=>dmMap[d.id]||d.nombre||'').join(' ');if(!dems.toLowerCase().includes(emp.toLowerCase()))return false;}
    if(ref&&p.referido_id!==ref)return false;
    if(rad&&!(p.radicado||'').toLowerCase().includes(rad))return false;
    return true;
  });
  const cont=document.getElementById('q-resultados');if(!cont)return;
  if(!list.length){cont.innerHTML='<div class="empty"><div class="empty-icon">🔎</div>Sin resultados</div>';return;}
  const totSaldo=list.reduce((s,p)=>s+DB.movimientos.filter(m=>m.proceso_id===p.id).reduce((ss,m)=>m.tipo==='Ingreso'&&m.estado==='Pagado'?ss+Number(m.monto):m.tipo==='Egreso'&&m.estado==='Pagado'?ss-Number(m.monto):ss,0),0);
  const rows=list.map(p=>{
    const dtes=(Array.isArray(p.demandantes)?p.demandantes:[]).map(d=>clMap[d.id]||d.nombre||'').filter(Boolean);
    if(!dtes.length&&p.cliente_id)dtes.push(clMap[p.cliente_id]||'');
    const dems=(Array.isArray(p.demandados)?p.demandados:[]).map(d=>dmMap[d.id]||d.nombre||'').filter(Boolean);
    const saldo=DB.movimientos.filter(m=>m.proceso_id===p.id).reduce((s,m)=>m.tipo==='Ingreso'&&m.estado==='Pagado'?s+Number(m.monto):m.tipo==='Egreso'&&m.estado==='Pagado'?s-Number(m.monto):s,0);
    return`<div class="card hover mb8" onclick="goTab('procesos','${p.id}')"><div class="flex jb aic wrap g10"><div class="f1">
      <div class="flex aic g8 wrap mb3"><span class="fw7 fs13">${esc(p.despacho||'Sin juzgado')}</span>${bdgEPR(p.estado)}${bdgTipo(p.tipo)}</div>
      <div class="tg fs12 fw7">👤 ${esc(dtes.join(' · ')||'—')}</div>
      ${dems.length?`<div class="tm fs12">⚔️ ${esc(dems.join(' · '))}</div>`:''}
      <div class="tm fs12">${p.radicado?'Rad: '+esc(p.radicado)+' · ':''}${esc(p.etapa)}${p.ciudad?' · '+esc(p.ciudad):''}</div>
    </div><div class="flex aic g12">
      <div class="stat-m"><div class="stat-mv tg">${DB.actuaciones.filter(a=>a.proceso_id===p.id).length}</div><div class="stat-ml">Act.</div></div>
      <div class="stat-m"><div class="stat-mv" style="color:${saldo>=0?'var(--success)':'var(--danger)'};font-size:12px">${fmtCOP(saldo)}</div><div class="stat-ml">Saldo</div></div>
      <span class="tg">›</span>
    </div></div></div>`;
  }).join('');
  cont.innerHTML=`<div class="flex jb aic wrap g10 mb12"><div class="tm fw7 fs13">${list.length} resultado(s) · Saldo: <span style="color:${totSaldo>=0?'var(--success)':'var(--danger)'};font-weight:800">${fmtCOP(totSaldo)}</span></div></div>${rows}`;
  window._lastQuery=list;
  // Add export button to results
  setTimeout(()=>{
    const cont=document.getElementById('q-resultados');
    if(cont&&list.length>0){
      const btn=document.createElement('div');
      btn.style.cssText='margin-bottom:14px';
      btn.innerHTML=`<button class="btn btn-info" onclick="expPDFConsulta()">📄 Exportar resultados a PDF</button>`;
      cont.insertBefore(btn,cont.firstChild);
    }
  },50);
};
window.limpiarConsulta=function(){['q-mes','q-est','q-etapa','q-tipo','q-juz','q-ciu','q-emp','q-ref','q-rad'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});document.getElementById('q-resultados').innerHTML='';};

// ═══ CONTABILIDAD ══════════════════════════════════════════════════
function pgContab(fT='',fC='',fD='',fH=''){
  const clMap=Object.fromEntries(DB.clientes.map(c=>[c.id,c.nombre]));
  const prMap=Object.fromEntries(DB.procesos.map(p=>[p.id,p.despacho]));
  let list=[...DB.movimientos];
  if(fD)list=list.filter(m=>m.fecha>=fD);
  if(fH)list=list.filter(m=>m.fecha<=fH);
  if(fT)list=list.filter(m=>m.tipo===fT);
  if(fC)list=list.filter(m=>m.cliente_id===fC);
  list=list.sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||''));
  const ing=list.filter(m=>m.tipo==='Ingreso'&&m.estado==='Pagado').reduce((s,m)=>s+Number(m.monto),0);
  const egr=list.filter(m=>m.tipo==='Egreso'&&m.estado==='Pagado').reduce((s,m)=>s+Number(m.monto),0);
  const pCob=list.filter(m=>m.tipo==='Ingreso'&&m.estado==='Pendiente').reduce((s,m)=>s+Number(m.monto),0);
  document.getElementById('pb').innerHTML=`
    <div class="grid g4 g10 mb16">${[['↑ Ingresos',ing,'var(--success)'],['↓ Egresos',egr,'var(--danger)'],['= Saldo',ing-egr,(ing-egr)>=0?'var(--success)':'var(--danger)'],['⏳ Por cobrar',pCob,'var(--warn)']].map(([l,v,c])=>`<div class="card" style="text-align:center"><div style="color:${c};font-weight:800;font-size:16px;margin-bottom:3px">${fmtCOP(v)}</div><div class="tm fs11 fw7 upper">${l}</div></div>`).join('')}</div>
    <div class="card gold-left mb12" style="padding:10px 14px"><div class="tm fs13">💡 Los movimientos se registran desde el detalle de cada proceso.</div></div>
    <div class="toolbar mb12">
      <input type="date" id="co-d" value="${esc(fD)}" onchange="filterCO()" title="Desde" style="flex:none;min-width:140px">
      <input type="date" id="co-h" value="${esc(fH)}" onchange="filterCO()" title="Hasta" style="flex:none;min-width:140px">
      <select id="co-t" onchange="filterCO()" style="flex:none;min-width:110px"><option value="">Todo</option><option${fT==='Ingreso'?' selected':''}>Ingreso</option><option${fT==='Egreso'?' selected':''}>Egreso</option></select>
      <select id="co-c" onchange="filterCO()" style="flex:1;min-width:150px"><option value="">Todos los clientes</option>${DB.clientes.map(c=>`<option value="${c.id}"${c.id===fC?' selected':''}>${esc(c.nombre)}</option>`).join('')}</select>
      <button class="btn btn-s sm" onclick="document.getElementById('co-d').value='';document.getElementById('co-h').value='';filterCO()">✕</button>
    </div>
    ${list.length===0?'<div class="empty"><div class="empty-icon">💰</div>Sin movimientos</div>':list.map(m=>`<div class="card mb8" style="border-left:3px solid ${m.tipo==='Ingreso'?'var(--success)':'var(--danger)'}"><div class="flex jb aic wrap g10"><div class="f1"><div class="flex aic g8 wrap mb3"><span style="color:${m.tipo==='Ingreso'?'var(--success)':'var(--danger)'};font-weight:800;font-size:15px">${m.tipo==='Ingreso'?'+':'-'}${fmtCOP(m.monto)}</span>${bdg(m.estado,m.estado==='Pagado'?'bg':'by')}<span class="tg fs12 fw7">${esc(m.concepto)}</span></div><div class="tm fs12">📅 ${fmtDate(m.fecha)} · 👤 ${esc(clMap[m.cliente_id]||'—')}${m.proceso_id?' · ⚖ '+esc(prMap[m.proceso_id]||''):''}</div>${m.notas?`<div class="tm fs11 ital">${esc(m.notas)}</div>`:''}</div></div></div>`).join('')}`;
}
window.filterCO=function(){pgContab(document.getElementById('co-t')?.value||'',document.getElementById('co-c')?.value||'',document.getElementById('co-d')?.value||'',document.getElementById('co-h')?.value||'');};

let persTab='resumen',persDesde='',persHasta='',persMes=today().slice(0,7);
function pgPersonal(){
  const itabs=[{id:'resumen',lbl:'📊 Balance'},{id:'movs',lbl:'📋 Movimientos'},{id:'nuevo',lbl:'+ Registrar'}];
  document.getElementById('pb').innerHTML=`<div class="inner-tabs mb0">${itabs.map(t=>`<button class="it${t.id===persTab?' active':''}" onclick="switchPersTab('${t.id}')">${t.lbl}</button>`).join('')}</div><div style="margin-top:16px" id="pers-inner">${persTab==='nuevo'?persFormHTML():persTab==='resumen'?persResumen():persMovHTML()}</div>`;
}
window.switchPersTab=function(t){persTab=t;pgPersonal();};
function persResumen(){
  let list=[...DB.personal];
  if(persDesde)list=list.filter(m=>m.fecha>=persDesde);
  if(persHasta)list=list.filter(m=>m.fecha<=persHasta);
  if(!persDesde&&!persHasta){const meses=[...new Set(DB.personal.map(m=>m.fecha?.slice(0,7)||''))].filter(Boolean).sort().reverse();if(meses.length&&!meses.includes(persMes))persMes=meses[0];list=DB.personal.filter(m=>m.fecha?.startsWith(persMes));}
  const ing=list.filter(m=>m.tipo==='Ingreso').reduce((s,m)=>s+Number(m.monto),0);
  const egr=list.filter(m=>m.tipo==='Egreso').reduce((s,m)=>s+Number(m.monto),0);
  const catE={};list.filter(m=>m.tipo==='Egreso').forEach(m=>{catE[m.concepto]=(catE[m.concepto]||0)+Number(m.monto);});
  const catI={};list.filter(m=>m.tipo==='Ingreso').forEach(m=>{catI[m.concepto]=(catI[m.concepto]||0)+Number(m.monto);});
  const bar=(v,t)=>t?Math.round(v/t*100):0;
  const meses=[...new Set(DB.personal.map(m=>m.fecha?.slice(0,7)||''))].filter(Boolean).sort().reverse();
  return`<div class="flex aic g10 wrap mb14">
    <div class="flex aic g8"><label class="fl" style="margin:0;white-space:nowrap">Mes:</label><select onchange="persMes=this.value;persDesde='';persHasta='';switchPersTab('resumen')" style="width:auto;min-width:130px"><option value="">— Por rango —</option>${meses.map(m=>`<option value="${m}"${m===persMes&&!persDesde?' selected':''}>${m}</option>`).join('')}</select></div>
    <div class="flex aic g6"><label class="fl" style="margin:0;white-space:nowrap">Desde:</label><input type="date" style="width:140px" value="${esc(persDesde)}" onchange="persDesde=this.value;persMes='';switchPersTab('resumen')"></div>
    <div class="flex aic g6"><label class="fl" style="margin:0;white-space:nowrap">Hasta:</label><input type="date" style="width:140px" value="${esc(persHasta)}" onchange="persHasta=this.value;persMes='';switchPersTab('resumen')"></div>
    <button class="btn btn-s sm" onclick="persDesde='';persHasta='';persMes=today().slice(0,7);switchPersTab('resumen')">✕</button>
  </div>
  <div class="grid g3 g10 mb16">
    <div class="card" style="text-align:center"><div class="ts fw8 fs17 mb3">${fmtCOP(ing)}</div><div class="tm fs11 fw7 upper">↑ Ingresos</div></div>
    <div class="card" style="text-align:center"><div class="td fw8 fs17 mb3">${fmtCOP(egr)}</div><div class="tm fs11 fw7 upper">↓ Gastos</div></div>
    <div class="card" style="text-align:center"><div style="color:${(ing-egr)>=0?'var(--success)':'var(--danger)'}" class="fw8 fs17 mb3">${fmtCOP(ing-egr)}</div><div class="tm fs11 fw7 upper">= Saldo</div></div>
  </div>
  <div class="grid g2 g14">
    <div class="card"><div class="sl mb10">💸 Gastos</div>${Object.keys(catE).length===0?'<div class="tm fs13">Sin gastos</div>':Object.entries(catE).sort((a,b)=>b[1]-a[1]).map(([cat,val])=>`<div class="mb10"><div class="flex jb mb4"><span class="fs12">${esc(cat)}</span><span class="fw7 fs12 td">${fmtCOP(val)}</span></div><div style="background:var(--bg);border-radius:3px;height:5px"><div style="background:var(--danger);height:5px;border-radius:3px;width:${bar(val,egr)}%"></div></div></div>`).join('')}</div>
    <div class="card"><div class="sl mb10">💵 Ingresos</div>${Object.keys(catI).length===0?'<div class="tm fs13">Sin ingresos</div>':Object.entries(catI).sort((a,b)=>b[1]-a[1]).map(([cat,val])=>`<div class="mb10"><div class="flex jb mb4"><span class="fs12">${esc(cat)}</span><span class="fw7 fs12 ts">${fmtCOP(val)}</span></div><div style="background:var(--bg);border-radius:3px;height:5px"><div style="background:var(--success);height:5px;border-radius:3px;width:${bar(val,ing)}%"></div></div></div>`).join('')}</div>
  </div>`;
}
function persMovHTML(){
  const list=[...DB.personal].sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||''));
  if(!list.length)return'<div class="empty"><div class="empty-icon">👤</div>Sin movimientos</div>';
  return list.map(m=>`<div class="card mb8" style="border-left:3px solid ${m.tipo==='Ingreso'?'var(--success)':'var(--danger)'}"><div class="flex jb aic wrap g10"><div class="f1"><div class="flex aic g8 wrap mb3"><span style="color:${m.tipo==='Ingreso'?'var(--success)':'var(--danger)'};font-weight:800;font-size:15px">${m.tipo==='Ingreso'?'+':'-'}${fmtCOP(m.monto)}</span><span class="tg fs12 fw7">${esc(m.concepto)}</span></div><div class="tm fs12">📅 ${fmtDate(m.fecha)}${m.notas?' · '+esc(m.notas):''}</div></div><button class="btn btn-d sm" onclick="delPers('${m.id}')">✕</button></div></div>`).join('');
}
function persFormHTML(){
  return`<div class="card" style="max-width:540px"><div class="sl mb10">Registrar movimiento personal</div>
    <form onsubmit="savePers(event)"><div class="grid g2">
      ${F('Tipo',`<select name="tipo" onchange="updCatPers(this)"><option>Egreso</option><option>Ingreso</option></select>`)}
      ${F('Fecha','<input type="date" name="fecha" value="'+today()+'">')}
      ${F('Categoría',`<select name="concepto" id="cat-pers">${sOpts(CONC_EGR_PERS,'')}</select>`,'s2')}
      ${F('Monto (COP) *','<input type="number" name="monto" min="0" placeholder="0" required>')}
      ${F('Notas','<input name="notas" placeholder="Opcional...">','s2')}
    </div><div class="flex je g10 mt12"><button type="button" class="btn btn-s" onclick="switchPersTab('resumen')">Cancelar</button><button type="submit" class="btn btn-p">Guardar</button></div>
    </form></div>`;
}
window.updCatPers=function(sel){const cp=document.getElementById('cat-pers');if(!cp)return;cp.innerHTML=sOpts(sel.value==='Ingreso'?CONC_ING_PERS:CONC_EGR_PERS,'');};
window.savePers=async function(e){e.preventDefault();const f=e.target;const d={id:uid(),tipo:f.tipo.value,fecha:f.fecha.value,concepto:f.concepto.value,monto:Number(f.monto.value),notas:f.notas.value};const ok=await dbInsert('personal',d);if(ok){DB.personal=[...DB.personal,d];toast('Guardado');persTab='resumen';pgPersonal();}};
window.delPers=async function(id){if(!confirm('¿Eliminar?'))return;const ok=await dbDelete('personal',id);if(ok){DB.personal=DB.personal.filter(m=>m.id!==id);toast('Eliminado');pgPersonal();}};

let _pdfIds = [];

function modalPDF(ids, titulo) {
  _pdfIds = ids;
  openModal(`<div class="modal-box" style="max-width:500px"><div class="modal-header"><span class="modal-title">📄 Exportar PDF</span><button class="modal-close" onclick="closeModal()">✕</button></div>
  <div class="modal-body">
    <div class="sl mb10">${titulo} — ${ids.length} proceso(s)</div>
    <div class="tm fs13 mb16">Seleccione el tipo de informe:</div>
    <div class="fcol g10">
      <div class="card" style="padding:18px 20px;cursor:pointer;border:2px solid var(--border)" onclick="generarPDF('basico');closeModal()" onmouseenter="this.style.borderColor='var(--gold)'" onmouseleave="this.style.borderColor='var(--border)'">
        <div class="fw7 fs14 tg mb6">📋 Informe básico</div>
        <div class="tm fs13">Datos del proceso + Estado actual + Pretensiones. Una página por proceso.</div>
      </div>
      <div class="card" style="padding:18px 20px;cursor:pointer;border:2px solid var(--border)" onclick="generarPDF('detallado');closeModal()" onmouseenter="this.style.borderColor='var(--gold)'" onmouseleave="this.style.borderColor='var(--border)'">
        <div class="fw7 fs14 tg mb6">📑 Informe detallado</div>
        <div class="tm fs13">Datos del proceso + Estado actual + Pretensiones + Todas las actuaciones cronológicas.</div>
      </div>
    </div>
    <div class="flex je mt14"><button class="btn btn-s" onclick="closeModal()">Cancelar</button></div>
  </div></div>`);
}

window.expPDFLista=function(){
  const list=DB.procesos;
  if(!list.length){toast('Sin procesos para exportar','err');return;}
  modalPDF(list.map(p=>p.id),'Todos los procesos');
};

window.expPDFConsulta=function(){
  const list=window._lastQuery||[];
  if(!list.length){toast('Sin resultados para exportar','err');return;}
  modalPDF(list.map(p=>p.id),'Resultados de consulta');
};

window.generarPDF=function(tipo){
  const ids=_pdfIds;
  const clMap=Object.fromEntries(DB.clientes.map(c=>[c.id,c.nombre]));
  const dmMap=Object.fromEntries(DB.demandados.map(d=>[d.id,d.nombre]));
  const procesos=ids.map(id=>DB.procesos.find(p=>p.id===id)).filter(Boolean);
  const fecha=new Date().toLocaleDateString('es-CO',{year:'numeric',month:'long',day:'numeric'});

  const e2=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  let html=`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
  <title>Informe LEXIS</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:Arial,sans-serif;font-size:12px;color:#1a1a2e;background:#fff;}
    .page{padding:30px 36px;page-break-after:always;}
    .page:last-child{page-break-after:avoid;}
    .header{display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #0A1628;padding-bottom:14px;margin-bottom:18px;}
    .logo{height:55px;object-fit:contain;}
    .header-info{text-align:right;}
    .header-info h1{font-size:14px;color:#0A1628;font-weight:700;}
    .header-info p{font-size:10px;color:#666;margin-top:3px;}
    .proceso-titulo{background:#0A1628;color:#fff;padding:10px 14px;border-radius:6px;margin-bottom:14px;}
    .proceso-titulo h2{font-size:14px;font-weight:700;}
    .proceso-titulo p{font-size:10px;opacity:.8;margin-top:3px;}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
    .campo{background:#f5f7fa;border:1px solid #e0e5ed;border-radius:5px;padding:8px 10px;}
    .campo label{display:block;font-size:9px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
    .campo p{font-size:12px;color:#1a1a2e;line-height:1.4;}
    .full{grid-column:span 2;}
    .estado-box{background:#fff8e6;border:2px solid #e8a030;border-radius:6px;padding:10px 12px;margin-bottom:12px;}
    .estado-box label{font-size:9px;font-weight:700;color:#e8a030;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px;}
    .estado-box p{font-size:12px;line-height:1.6;}
    .section-title{font-size:11px;font-weight:700;color:#0A1628;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e0e5ed;padding-bottom:5px;margin:14px 0 10px;}
    .actuacion{border-left:3px solid #C9A84C;padding:7px 10px;margin-bottom:8px;background:#fafbfd;}
    .actuacion .fecha{font-size:10px;font-weight:700;color:#C9A84C;}
    .actuacion .tipo{font-size:10px;background:#0A162810;padding:1px 6px;border-radius:10px;display:inline-block;margin-left:6px;}
    .actuacion .desc{font-size:11px;margin-top:4px;line-height:1.5;}
    .actuacion .result{font-size:11px;color:#2e7d46;margin-top:3px;}
    .footer{text-align:center;font-size:9px;color:#999;border-top:1px solid #e0e5ed;padding-top:8px;margin-top:16px;}
    @media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}
  </style></head><body>`;

  procesos.forEach(function(pr,idx){
    const dtes=(Array.isArray(pr.demandantes)?pr.demandantes:[]).map(d=>clMap[d.id]||d.nombre||'').filter(Boolean);
    if(!dtes.length&&pr.cliente_id)dtes.push(clMap[pr.cliente_id]||'');
    const dems=(Array.isArray(pr.demandados)?pr.demandados:[]).map(d=>dmMap[d.id]||d.nombre||'').filter(Boolean);
    const acs=[...DB.actuaciones.filter(a=>a.proceso_id===pr.id)].sort((a,b)=>(a.fecha||'').localeCompare(b.fecha||''));
    const fmtF=d=>d?new Date(d+'T12:00:00').toLocaleDateString('es-CO'):'—';

    html+='<div class="page">';
    html+='<div class="header"><img src="'+LOGO_PDF+'" class="logo" alt="Logo"><div class="header-info"><h1>INFORME DE PROCESO JUDICIAL</h1><p>Alejandro Puentes Abogado &mdash; '+fecha+'</p><p>Proceso '+(idx+1)+' de '+procesos.length+'</p></div></div>';
    html+='<div class="proceso-titulo"><h2>'+e2(pr.despacho||'Juzgado pendiente')+' <span style="background:rgba(255,255,255,.2);padding:2px 8px;border-radius:10px;font-size:10px;margin-left:8px">'+e2(pr.estado)+'</span></h2>';
    html+='<p>'+e2(pr.tipo)+' &middot; '+e2(pr.etapa)+(pr.radicado?' &middot; Rad: '+e2(pr.radicado):'')+(pr.ciudad?' &middot; '+e2(pr.ciudad):'')+'</p></div>';
    html+='<div class="grid2">';
    html+='<div class="campo"><label>Demandante(s)</label><p>'+e2(dtes.join(' / ')||'—')+'</p></div>';
    html+='<div class="campo"><label>Demandado(s)</label><p>'+e2(dems.join(' / ')||'—')+'</p></div>';
    html+='<div class="campo"><label>Tipo de proceso</label><p>'+e2(pr.tipo||'—')+'</p></div>';
    html+='<div class="campo"><label>Etapa procesal</label><p>'+e2(pr.etapa||'—')+'</p></div>';
    html+='<div class="campo"><label>Radicado</label><p>'+e2(pr.radicado||'—')+'</p></div>';
    html+='<div class="campo"><label>Fecha inicio</label><p>'+fmtF(pr.fecha_inicio)+'</p></div>';
    if(pr.pretensiones)html+='<div class="campo full"><label>Pretensiones</label><p>'+e2(pr.pretensiones)+'</p></div>';
    if(pr.observacion)html+='<div class="campo full"><label>Observación</label><p>'+e2(pr.observacion)+'</p></div>';
    html+='</div>';
    if(pr.estado_actual)html+='<div class="estado-box"><label>&#9889; Estado actual del proceso</label><p>'+e2(pr.estado_actual)+'</p></div>';
    if(tipo==='detallado'&&acs.length>0){
      html+='<div class="section-title">ACTUACIONES ('+acs.length+')</div>';
      acs.forEach(function(a){
        html+='<div class="actuacion"><span class="fecha">'+fmtF(a.fecha)+'</span><span class="tipo">'+e2(a.tipo||'')+'</span>';
        if(a.descripcion)html+='<div class="desc">'+e2(a.descripcion)+'</div>';
        if(a.resultado)html+='<div class="result">&#10003; '+e2(a.resultado)+'</div>';
        if(a.proxima_fecha)html+='<div class="desc" style="color:#e8a030">&#8594; Pr&oacute;xima: '+fmtF(a.proxima_fecha)+(a.proxima_actuacion?' &mdash; '+e2(a.proxima_actuacion):'')+'</div>';
        html+='</div>';
      });
    }
    html+='<div class="footer">LEXIS &middot; Alejandro Puentes Abogado &middot; '+fecha+'</div>';
    html+='</div>';
  });

  html+='</body></html>';
  const win=window.open('','_blank');
  if(!win){toast('Active las ventanas emergentes en su navegador','err');return;}
  win.document.write(html);
  win.document.close();
  setTimeout(function(){win.print();},600);
};


function dlFile(c,n,m){const b=new Blob([c],{type:m});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=n;a.click();URL.revokeObjectURL(u);}

window.expJSON=function(){
  const payload={version:'LEXIS-v4-cloud',exportado:new Date().toISOString(),clientes:DB.clientes,demandados:DB.demandados,prospectos:DB.prospectos,procesos:DB.procesos,actuaciones:DB.actuaciones,tareas:DB.tareas,movimientos:DB.movimientos,personal:DB.personal};
  dlFile(JSON.stringify(payload,null,2),`LEXIS_respaldo_${today()}.json`,'application/json');toast('Respaldo descargado');
};

window.expCSV=function(tipo){
  const e2=v=>`"${String(v??'').replace(/"/g,'""')}"`;
  const csv=rows=>{if(!rows.length)return'';const h=Object.keys(rows[0]);return[h.map(e2).join(','),...rows.map(r=>h.map(k=>e2(r[k])).join(','))].join('\n');};
  const clMap=Object.fromEntries(DB.clientes.map(c=>[c.id,c.nombre]));
  const prMap=Object.fromEntries(DB.procesos.map(p=>[p.id,p.despacho]));
  const maps={
    cl:()=>DB.clientes.map(c=>({Nombre:c.nombre,'Tipo ID':c.tipo_id,'CC/NIT':c.cedula,Teléfono:c.telefono,Email:c.email,Ciudad:c.ciudad,EPS:c.eps,'Fondo Pensión':c.fondo_pension,'Salario COP':c.salario,Notas:c.notas})),
    dm:()=>DB.demandados.map(d=>({Nombre:d.nombre,'Tipo Persona':d.tipo_persona,'CC/NIT':d.cedula,Teléfono:d.telefono,Ciudad:d.ciudad})),
    ps:()=>DB.prospectos.map(p=>({Nombres:p.nombres,Teléfono:p.telefono,Email:p.email,Ciudad:p.ciudad,'Tipo Acción':p.tipo_accion,Estado:p.estado,'Empresa Demandada':p.empresa_demandada,'Relato Caso':p.relato_caso})),
    pr:()=>DB.procesos.map(p=>({Despacho:p.despacho,Radicado:p.radicado,Tipo:p.tipo,Etapa:p.etapa,Estado:p.estado,Ciudad:p.ciudad,'Fecha Inicio':p.fecha_inicio,Demandantes:(Array.isArray(p.demandantes)?p.demandantes:[]).map(d=>clMap[d.id]||d.nombre).join('; ')||(clMap[p.cliente_id]||''),Demandados:(Array.isArray(p.demandados)?p.demandados:[]).map(d=>d.nombre).join('; ')})),
    ac:()=>DB.actuaciones.map(a=>({Fecha:a.fecha,Tipo:a.tipo,Descripción:a.descripcion,Resultado:a.resultado,'Próxima Fecha':a.proxima_fecha,Proceso:prMap[a.proceso_id]||''})),
    mo:()=>DB.movimientos.map(m=>({Fecha:m.fecha,Tipo:m.tipo,Concepto:m.concepto,'Monto COP':m.monto,Estado:m.estado,Cliente:clMap[m.cliente_id]||'',Proceso:prMap[m.proceso_id]||''})),
    pe:()=>DB.personal.map(m=>({Fecha:m.fecha,Tipo:m.tipo,Concepto:m.concepto,'Monto COP':m.monto,Notas:m.notas})),
    ta:()=>DB.tareas.map(t=>({Título:t.titulo,'Fecha Límite':t.fecha_limite,Prioridad:t.prioridad,Estado:t.estado,Cliente:clMap[t.cliente_id]||''})),
  };
  const nombres={cl:'clientes',dm:'demandados',ps:'prospectos',pr:'procesos',ac:'actuaciones',mo:'contabilidad',pe:'personal',ta:'tareas'};
  dlFile('\uFEFF'+csv(maps[tipo]()),`LEXIS_${nombres[tipo]}_${today()}.csv`,'text/csv;charset=utf-8');toast('CSV exportado');
};

window.expICS=function(soloId){
  const hoy=today();const clMap=Object.fromEntries(DB.clientes.map(c=>[c.id,c.nombre]));const prMap=Object.fromEntries(DB.procesos.map(p=>[p.id,p]));const evs=[];
  // Próximas actuaciones
  DB.actuaciones.filter(a=>a.proxima_fecha&&a.proxima_fecha>=hoy&&(!soloId||a.id===soloId)).forEach(a=>{const pr=prMap[a.proceso_id];evs.push({uid:a.id+'_p@lx4',fecha:a.proxima_fecha,titulo:'📋 '+(a.proxima_actuacion||'Actuación')+' — '+(pr?.despacho||''),desc:'Proceso: '+(pr?.despacho||'')+'\\nCliente: '+(clMap[pr?.cliente_id]||''),alarm:1440});});
  // Audiencias futuras
  if(!soloId){
    DB.audiencias.filter(a=>a.fecha>=hoy).forEach(a=>{const pr=prMap[a.proceso_id];evs.push({uid:a.id+'_aud@lx4',fecha:a.fecha,titulo:'🗓️ '+a.tipo+' — '+(pr?.despacho||''),desc:'Proceso: '+(pr?.despacho||'')+'\\nCliente: '+(clMap[pr?.cliente_id]||''),alarm:1440});});
    DB.audiencias.filter(a=>a.proxima_fecha&&a.proxima_fecha>=hoy).forEach(a=>{const pr=prMap[a.proceso_id];evs.push({uid:a.id+'_audp@lx4',fecha:a.proxima_fecha,titulo:'🗓️ '+(a.proxima_actuacion||a.tipo)+' — '+(pr?.despacho||''),desc:'Proceso: '+(pr?.despacho||'')+'\\nCliente: '+(clMap[pr?.cliente_id]||''),alarm:1440});});
    // Tareas pendientes
    DB.tareas.filter(t=>t.fecha_limite&&t.fecha_limite>=hoy&&t.estado!=='Completada').forEach(t=>{evs.push({uid:t.id+'@lx4',fecha:t.fecha_limite,titulo:'✅ '+t.titulo,desc:'Tarea LEXIS · Prioridad: '+t.prioridad,alarm:480});});
  }
  if(!evs.length){toast('Sin audiencias o tareas futuras','err');return;}
  _generarICS(evs,'LEXIS_agenda_'+today()+'.ics');
  toast(evs.length+' evento(s) exportados a Outlook');
};
window.expICS1=function(acId){expICS(acId);};

// ═══ CONFIGURACIÓN ═════════════════════════════════════════════════
let cfgTab='juzgados';
function pgConfig(){
  const tabs=[{id:'juzgados',lbl:'⚖ Juzgados'},{id:'ciudades',lbl:'🏙 Ciudades'},{id:'empresas',lbl:'🏢 Empresas'},{id:'referidos',lbl:'👥 Referidos'},{id:'conceptos',lbl:'💰 Conceptos'}];
  document.getElementById('pb').innerHTML=`<div class="cfg-tabs">${tabs.map(t=>`<div class="cfg-tab${t.id===cfgTab?' active':''}" onclick="cfgTab='${t.id}';pgConfig()">${t.lbl}</div>`).join('')}</div><div id="cfg-inner">${cfgInner()}</div>`;
}
function cfgInner(){
  if(cfgTab==='juzgados')return cfgList('juzgados','jz','⚖ Juzgados y Despachos',true);
  if(cfgTab==='ciudades')return cfgList('ciudades','ci','🏙 Ciudades y Municipios',false);
  if(cfgTab==='empresas')return cfgList('empresas','em','🏢 Empresas / Entidades Demandadas',false);
  if(cfgTab==='referidos')return cfgReferidos();
  if(cfgTab==='conceptos')return cfgConceptos();
  return '';
}
function cfgList(key,pfx,title,hasDef){
  const items=DB.cfg[key]||[];
  return`<div class="card"><h3 class="tg mb6" style="font-size:14px;font-weight:700">${title}</h3>
    <div class="flex g8 mb12"><input id="${pfx}-n" placeholder="Nuevo elemento..." style="flex:1" onkeydown="if(event.key==='Enter')addCfgItem('${key}','${pfx}')"><button class="btn btn-p sm" onclick="addCfgItem('${key}','${pfx}')">+ Agregar</button></div>
    ${items.length===0?'<div class="tm fs13 mb12">Sin elementos.</div>':''}
    <div class="fcol g5">${items.map((j,i)=>`<div style="display:flex;align-items:center;gap:7px;padding:7px 10px;background:var(--bg);border-radius:7px"><span class="f1 fs13">${esc(j)}</span><button class="btn btn-d sm" onclick="delCfgItem('${key}',${i})">✕</button></div>`).join('')}</div>
  </div>`;
}
window.addCfgItem=async function(key,pfx){const v=document.getElementById(pfx+'-n')?.value.trim();if(!v||(DB.cfg[key]||[]).includes(v))return;const arr=[...(DB.cfg[key]||[]),v];const ok=await dbUpsertCfg(key,arr);if(ok){DB.cfg[key]=arr;toast('Agregado');pgConfig();}};
window.delCfgItem=async function(key,i){const arr=[...(DB.cfg[key]||[])];arr.splice(i,1);const ok=await dbUpsertCfg(key,arr);if(ok){DB.cfg[key]=arr;toast('Eliminado');pgConfig();}};

function cfgReferidos(){
  const rfs=DB.cfg.referidos||[];
  return`<div class="card"><h3 class="tg mb6" style="font-size:14px;font-weight:700">👥 Referidos</h3>
    <div class="grid g2 g8 mb12"><input id="rf-n" placeholder="Nombre del referido..."><div class="flex g8"><input id="rf-t" placeholder="Teléfono" style="flex:1"><button class="btn btn-p sm" onclick="addRef()">+ Agregar</button></div></div>
    ${rfs.length===0?'<div class="tm fs13">Sin referidos</div>':rfs.map((r,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg);border-radius:7px;margin-bottom:5px"><div class="f1"><div class="fw7 fs13">${esc(r.nombre)}</div>${r.telefono?`<div class="tm fs12">📞 ${esc(r.telefono)}</div>`:''}</div><button class="btn btn-d sm" onclick="delRef(${i})">✕</button></div>`).join('')}
  </div>`;
}
window.addRef=async function(){const n=document.getElementById('rf-n')?.value.trim();const t=document.getElementById('rf-t')?.value.trim();if(!n)return;const arr=[...(DB.cfg.referidos||[]),{id:uid(),nombre:n,telefono:t}];const ok=await dbUpsertCfg('referidos',arr);if(ok){DB.cfg.referidos=arr;toast('Referido agregado');pgConfig();}};
window.delRef=async function(i){if(!confirm('¿Eliminar?'))return;const arr=[...(DB.cfg.referidos||[])];arr.splice(i,1);const ok=await dbUpsertCfg('referidos',arr);if(ok){DB.cfg.referidos=arr;toast('Eliminado');pgConfig();}};

function cfgConceptos(){
  const ci=[...CONC_ING_DEF,...(DB.cfg.conc_ingresos||[])];
  const ce=[...CONC_EGR_DEF,...(DB.cfg.conc_egresos||[])];
  return`<div class="grid g2 g14">
    <div class="card"><h3 class="ts mb10" style="font-size:14px;font-weight:700">↑ Conceptos Ingresos</h3>
      <div class="flex g8 mb10"><input id="ci-n" placeholder="Nuevo concepto..." style="flex:1" onkeydown="if(event.key==='Enter')addConc('ci')"><button class="btn btn-ok sm" onclick="addConc('ci')">+</button></div>
      ${ci.map((c,i)=>`<div style="display:flex;align-items:center;gap:7px;padding:6px 10px;background:var(--bg);border-radius:7px;margin-bottom:4px"><span class="f1 fs13">${esc(c)}</span>${i>=CONC_ING_DEF.length?`<button class="btn btn-d sm" onclick="delConc('ci',${i-CONC_ING_DEF.length})">✕</button>`:''}</div>`).join('')}
    </div>
    <div class="card"><h3 class="td mb10" style="font-size:14px;font-weight:700">↓ Conceptos Egresos</h3>
      <div class="flex g8 mb10"><input id="ce-n" placeholder="Nuevo concepto..." style="flex:1" onkeydown="if(event.key==='Enter')addConc('ce')"><button class="btn btn-d sm" onclick="addConc('ce')">+</button></div>
      ${ce.map((c,i)=>`<div style="display:flex;align-items:center;gap:7px;padding:6px 10px;background:var(--bg);border-radius:7px;margin-bottom:4px"><span class="f1 fs13">${esc(c)}</span>${i>=CONC_EGR_DEF.length?`<button class="btn btn-d sm" onclick="delConc('ce',${i-CONC_EGR_DEF.length})">✕</button>`:''}</div>`).join('')}
    </div>
  </div>`;
}
window.addConc=async function(tipo){const key=tipo==='ci'?'conc_ingresos':'conc_egresos';const v=document.getElementById(tipo+'-n')?.value.trim();if(!v)return;const arr=[...(DB.cfg[key]||[]),v];const ok=await dbUpsertCfg(key,arr);if(ok){DB.cfg[key]=arr;toast('Concepto agregado');pgConfig();}};
window.delConc=async function(tipo,i){const key=tipo==='ci'?'conc_ingresos':'conc_egresos';const arr=[...(DB.cfg[key]||[])];arr.splice(i,1);const ok=await dbUpsertCfg(key,arr);if(ok){DB.cfg[key]=arr;toast('Eliminado');pgConfig();}};
</script>
